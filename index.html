<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flash Power Calc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0a0a0a; min-height: 100vh; }
    body { font-family: system-ui, -apple-system, sans-serif; color: #e0e0e0; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #E8A030;
      cursor: pointer;
      border: 3px solid #0a0a0a;
      box-shadow: 0 0 8px rgba(232,160,48,0.45);
    }
    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #E8A030;
      cursor: pointer;
      border: 2px solid #0a0a0a;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 16px 14px 48px;
      max-width: 960px;
      margin: 0 auto;
    }
    @media (min-width: 700px) {
      .layout {
        grid-template-columns: 1fr 1fr;
        padding: 24px 24px 56px;
        gap: 14px;
      }
      .col-params { grid-column: 1; grid-row: 1; }
      .col-mods   { grid-column: 1; grid-row: 2; }
      .col-result { grid-column: 2; grid-row: 1 / 3; position: sticky; top: 24px; align-self: start; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ─── dati ────────────────────────────────────────────────────────────────
    const APERTURES    = [1, 1.4, 2, 2.8, 4, 5.6, 8, 11, 16, 22, 32];
    const ISO_VALUES   = [100, 200, 400, 800, 1600, 3200];
    const ZOOM_VALUES  = [24, 28, 35, 50, 70, 85, 105, 135, 200];
    const POWER_LABELS = ["1/1","1/2","1/4","1/8","1/16","1/32","1/64","1/128"];

    // Il modificatore assorbe luce → riduce l'eccesso di potenza disponibile
    const MODIFIERS = [
      { id: "none",    short: "Diretto",            stops: 0   },
      { id: "refl",    short: "Ombrello riflettente",stops: 1.0 },
      { id: "thru",    short: "Ombrello traslucido", stops: 1.5 },
      { id: "softbox", short: "Softbox",             stops: 1.5 },
      { id: "bounce",  short: "Rimbalzo bianco",      stops: 2.5 },
    ];

    const A  = "#E8A030";
    const BG = "#0a0a0a";
    const S1 = "#141414";
    const S2 = "#1c1c1c";
    const LBL = { fontSize:"11px", letterSpacing:"1.5px", color:"#555", textTransform:"uppercase" };

    // ─── calcolo ─────────────────────────────────────────────────────────────
    /*
      GN dichiarato a 200 mm (parabola chiusa), ISO 100.

      Correzione zoom: GN(z) = GN × (z/200)^(1/3)
        Esponente 1/3 da dati reali su 5 flash (Tealdi 2020) e Godox V860III.
        Errore < ±0.25 EV su 24–200 mm.

        GN_eff   = GN × (zoom/200)^(1/3) × √(ISO/100)
        f_max    = GN_eff / distanza
        stops    = 2×log₂(f_max / f_set) − mod_stops
        idx      = ⌈stops⌉          → livello di potenza (1/1 … 1/128)
        offset   = idx − stops      → frazione di stop da aggiungere (0.0 … 0.9)
    */
    function calcFlash({ gn, zoom, distance, iso, aperture, modStops }) {
      const gnEff     = gn * Math.pow(zoom / 200, 1/3) * Math.sqrt(iso / 100);
      const fMax      = gnEff / distance;
      const stopsBase = 2 * Math.log2(fMax / aperture);
      const stops     = stopsBase - modStops;

      if (stops < -0.05) return { err: "weak",   gnEff, fMax };
      if (stops > 7.95)  return { err: "strong",  gnEff, fMax };

      const s      = Math.max(0, Math.min(7.9999, stops));
      let   idx    = Math.ceil(s - 0.0001);
      let   offset = Math.round((idx - s) * 10) / 10;
      if (offset >= 1) { idx = Math.max(0, idx - 1); offset = 0; }

      return { err: null, idx, label: POWER_LABELS[idx], offset, gnEff, fMax };
    }

    // ─── componenti ──────────────────────────────────────────────────────────

    function Pill({ v, current, onSelect, fmt, style }) {
      const on = v === current;
      return (
        <button onClick={() => onSelect(v)} style={{
          background:   on ? A : S2,
          color:        on ? "#000" : "#666",
          border:       `1px solid ${on ? A : "#282828"}`,
          borderRadius: "4px",
          padding:      "9px 2px",
          fontSize:     "12px",
          fontFamily:   "monospace",
          fontWeight:   on ? 700 : 400,
          cursor:       "pointer",
          touchAction:  "manipulation",
          lineHeight:   "1",
          flex:         "1 1 0",
          minWidth:     0,
          ...style,
        }}>
          {fmt ? fmt(v) : v}
        </button>
      );
    }

    function RangeRow({ label, value, onChange, min, max, step, display }) {
      const pct = ((value - min) / (max - min)) * 100;
      const bg  = `linear-gradient(to right, ${A} 0%, ${A} ${pct}%, ${S2} ${pct}%, ${S2} 100%)`;
      return (
        <div style={{ marginBottom: "20px" }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"8px" }}>
            <span style={LBL}>{label}</span>
            <span style={{ fontSize:"15px", color:A, fontFamily:"monospace", fontWeight:700 }}>{display}</span>
          </div>
          <input type="range" min={min} max={max} step={step} value={value}
            onChange={e => onChange(parseFloat(e.target.value))} style={{ background: bg }} />
        </div>
      );
    }

    function PillRow({ label, values, current, onSelect, fmt }) {
      return (
        <div style={{ marginBottom: "20px" }}>
          <div style={{ ...LBL, marginBottom:"8px" }}>{label}</div>
          <div style={{ display:"flex", gap:"3px" }}>
            {values.map(v => <Pill key={v} v={v} current={current} onSelect={onSelect} fmt={fmt} />)}
          </div>
        </div>
      );
    }

    // Diaframmi su due righe: 6 + 5
    function ApertureRow({ current, onSelect }) {
      const row1 = APERTURES.slice(0, 6);
      const row2 = APERTURES.slice(6);
      return (
        <div style={{ marginBottom: "4px" }}>
          <div style={{ ...LBL, marginBottom:"8px" }}>Diaframma</div>
          <div style={{ display:"flex", gap:"3px", marginBottom:"3px" }}>
            {row1.map(v => <Pill key={v} v={v} current={current} onSelect={onSelect}
              fmt={v => `f/${v}`} />)}
          </div>
          <div style={{ display:"flex", gap:"3px" }}>
            {row2.map(v => <Pill key={v} v={v} current={current} onSelect={onSelect}
              fmt={v => `f/${v}`} />)}
          </div>
        </div>
      );
    }

    // Modificatori: Diretto su riga intera + griglia 2×2
    function ModifierGrid({ current, onSelect }) {
      const first = MODIFIERS[0];
      const rest  = MODIFIERS.slice(1);
      return (
        <div>
          <div style={{ ...LBL, marginBottom:"10px", paddingBottom:"10px", borderBottom:`1px solid ${S2}` }}>
            Modificatori
          </div>
          {/* Diretto — full width */}
          {[first].map(m => {
            const on = current === m.id;
            return (
              <button key={m.id} onClick={() => onSelect(m.id)} style={{
                display:      "flex",
                justifyContent:"space-between",
                alignItems:   "center",
                width:        "100%",
                background:   on ? "rgba(232,160,48,0.09)" : "transparent",
                border:       `1px solid ${on ? A : "#242424"}`,
                borderRadius: "6px",
                padding:      "11px 14px",
                marginBottom: "6px",
                cursor:       "pointer",
                touchAction:  "manipulation",
                transition:   "all 0.12s",
              }}>
                <span style={{ fontSize:"13px", fontWeight: on ? 600 : 400, color: on ? A : "#666" }}>
                  {m.short}
                </span>
                <span style={{ fontFamily:"monospace", fontSize:"11px", color: on ? "rgba(232,160,48,0.55)" : "#333" }}>
                  ±0 EV
                </span>
              </button>
            );
          })}
          {/* altri — griglia 2×2 */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"6px" }}>
            {rest.map(m => {
              const on = current === m.id;
              return (
                <button key={m.id} onClick={() => onSelect(m.id)} style={{
                  background:   on ? "rgba(232,160,48,0.09)" : "transparent",
                  border:       `1px solid ${on ? A : "#242424"}`,
                  borderRadius: "6px",
                  padding:      "11px 12px",
                  cursor:       "pointer",
                  touchAction:  "manipulation",
                  textAlign:    "left",
                  transition:   "all 0.12s",
                }}>
                  <div style={{ fontSize:"13px", fontWeight: on ? 600 : 400,
                    color: on ? A : "#666", lineHeight:"1.3" }}>
                    {m.short}
                  </div>
                  <div style={{ fontFamily:"monospace", fontSize:"11px",
                    color: on ? "rgba(232,160,48,0.55)" : "#333", marginTop:"3px" }}>
                    −{m.stops.toFixed(1)} EV
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── app ─────────────────────────────────────────────────────────────────

    function FlashCalc() {
      const [gn,   setGn]   = useState(60);
      const [zoom, setZoom] = useState(50);
      const [dist, setDist] = useState(2.0);
      const [iso,  setIso]  = useState(100);
      const [apt,  setApt]  = useState(8);
      const [mod,  setMod]  = useState("none");

      const modDef = MODIFIERS.find(m => m.id === mod);
      const R = useMemo(
        () => calcFlash({ gn, zoom, distance: dist, iso, aperture: apt, modStops: modDef.stops }),
        [gn, zoom, dist, iso, apt, modDef]
      );

      return (
        <div style={{ background:BG, minHeight:"100vh" }}>

          {/* header */}
          <div style={{ padding:"22px 18px 0", maxWidth:"960px", margin:"0 auto" }}>
            <h1 style={{
              fontFamily:"'Space Mono', monospace",
              fontWeight: 700,
              fontSize:   "22px",
              letterSpacing: "3px",
              textTransform: "uppercase",
              color: "#fff",
            }}>
              Flash <span style={{ color:A }}>Power</span> Calc
            </h1>
          </div>

          <div className="layout">

            {/* parametri */}
            <div className="col-params" style={{ background:S1, borderRadius:"10px", padding:"20px 16px" }}>
              <div style={{ ...LBL, marginBottom:"18px", paddingBottom:"10px", borderBottom:`1px solid ${S2}` }}>
                Parametri
              </div>
              <RangeRow label="Numero Guida" value={gn} onChange={setGn}
                min={10} max={120} step={1} display={String(gn)} />
              <RangeRow label="Distanza" value={dist} onChange={setDist}
                min={0.5} max={15} step={0.1} display={`${dist.toFixed(1)} m`} />
              <PillRow label="Zoom Flash" values={ZOOM_VALUES} current={zoom} onSelect={setZoom}
                fmt={v => `${v}`} />
              <PillRow label="ISO" values={ISO_VALUES} current={iso} onSelect={setIso} />
              <ApertureRow current={apt} onSelect={setApt} />
            </div>

            {/* modificatori */}
            <div className="col-mods" style={{ background:S1, borderRadius:"10px", padding:"20px 16px" }}>
              <ModifierGrid current={mod} onSelect={setMod} />
            </div>

            {/* risultato */}
            <div className="col-result" style={{
              background:     R.err ? S1 : `radial-gradient(ellipse at 50% 20%, rgba(232,160,48,0.08) 0%, ${S1} 65%)`,
              border:         `1px solid ${R.err ? "#1e1e1e" : "rgba(232,160,48,0.2)"}`,
              borderRadius:   "10px",
              padding:        "36px 24px",
              display:        "flex",
              flexDirection:  "column",
              alignItems:     "center",
              justifyContent: "center",
              gap:            "10px",
              minHeight:      "260px",
              textAlign:      "center",
            }}>

              {R.err === "weak" && (
                <>
                  <div style={{ fontSize:"36px" }}>🔅</div>
                  <div style={{ fontFamily:"'Space Mono',monospace", fontSize:"11px",
                    color:"#ef4444", letterSpacing:"1px" }}>FLASH INSUFFICIENTE</div>
                  <div style={{ fontSize:"12px", color:"#444", lineHeight:"2", marginTop:"4px" }}>
                    Apri il diaframma · Aumenta ISO<br />
                    Avvicina il soggetto · GN maggiore
                  </div>
                </>
              )}

              {R.err === "strong" && (
                <>
                  <div style={{ fontSize:"36px" }}>⚡</div>
                  <div style={{ fontFamily:"'Space Mono',monospace", fontSize:"11px",
                    color:"#f59e0b", letterSpacing:"1px" }}>POTENZA ECCESSIVA</div>
                  <div style={{ fontSize:"12px", color:"#444", lineHeight:"2", marginTop:"4px" }}>
                    Chiudi il diaframma · Riduci ISO<br />
                    Allontana il soggetto
                  </div>
                </>
              )}

              {!R.err && (
                <>
                  {/* potenza */}
                  <div style={{
                    fontFamily: "'Space Mono', monospace",
                    fontSize:   "clamp(58px, 14vw, 88px)",
                    fontWeight: 700,
                    color:      A,
                    lineHeight: 1,
                    letterSpacing: "-1px",
                  }}>
                    {R.label}
                  </div>

                  {/* offset — frazione di stop intermedia */}
                  <div style={{ display:"flex", alignItems:"baseline", gap:"7px", marginTop:"2px" }}>
                    <span style={{ fontFamily:"'Space Mono',monospace", fontSize:"28px", fontWeight:700,
                      color: R.offset > 0 ? "#d0d0d0" : "#252525" }}>
                      +{R.offset.toFixed(1)}
                    </span>
                    <span style={{ fontSize:"11px", color:"#444", letterSpacing:"1px" }}>EV</span>
                  </div>

                  {/* barra */}
                  <div style={{ width:"100%", marginTop:"10px" }}>
                    <div style={{ display:"flex", gap:"3px" }}>
                      {POWER_LABELS.map((_, i) => (
                        <div key={i} style={{
                          flex: 1, height:"5px", borderRadius:"2px",
                          background:  i===R.idx ? A : i<R.idx ? "rgba(232,160,48,0.18)" : "#1c1c1c",
                          boxShadow:   i===R.idx ? `0 0 8px ${A}` : "none",
                        }} />
                      ))}
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginTop:"4px" }}>
                      {POWER_LABELS.map((lbl, i) => (
                        <span key={i} style={{ fontFamily:"monospace", fontSize:"8px",
                          color: i===R.idx ? A : "#2a2a2a" }}>{lbl}</span>
                      ))}
                    </div>
                  </div>

                  {/* dettaglio */}
                  <div style={{ marginTop:"8px", fontFamily:"monospace", fontSize:"11px",
                    color:"#333", lineHeight:"1.9" }}>
                    GN<sub>eff</sub> {R.gnEff.toFixed(1)} · f/{R.fMax.toFixed(1)} @ 1/1
                    {modDef.stops > 0 && (
                      <span><br />mod −{modDef.stops.toFixed(1)} EV ({modDef.short})</span>
                    )}
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<FlashCalc />);
  </script>
</body>
</html>
